name: Actualización Eureka Final
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Instalar Dependencias
        run: |
          pip install feedparser googletrans==4.0.0-rc1 spacy requests
          python -m spacy download es_core_news_lg
      - name: Ejecutar Cerebro
        run: python generador_noticias.py
      - name: Publicar Cambios
        run: |
          git config --global user.name "Eureka-Bot"
          git config --global user.email "bot@eureka.com"
          git add noticias.json
          git commit -m "Sincronización de Archivo Científico" || echo "Sin cambios"
          git push
