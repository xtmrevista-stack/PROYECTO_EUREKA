name: Actualización SWN
on:
  schedule:
    - cron: '0 12 * * *' # Se ejecuta automáticamente cada mediodía
  workflow_dispatch: # Esto te permite picar el botón de "Run workflow" manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargando el repositorio
        uses: actions/checkout@v4

      - name: Configurando Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalando todas las librerías necesarias
        run: |
          pip install feedparser googletrans==4.0.0-rc1 spacy requests
          python -m spacy download es_core_news_lg

      - name: Ejecutando el Cerebro Maestro
        run: python generador_noticias.py

      - name: Guardando y subiendo noticias.json a GitHub
        run: |
          git config --global user.name "Cerebro SWN"
          git config --global user.email "swn@github.com"
          git add noticias.json
          git commit -m "Sincronización de Tesauros y Noticias" || echo "Sin cambios"
          git push
