<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SCIENCE WORLD NEWS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Roboto:wght@900&display=swap');
        body { font-family: 'Roboto', sans-serif; background: #fff; }
        .titular { font-family: 'Archivo Black', sans-serif; }
        .card { border: 6px solid #000; transition: 0.2s; height: 100%; display: flex; flex-direction: column; }
        .card:hover { transform: translate(-8px, -8px); box-shadow: 15px 15px 0px #000; }
        
        /* Colores Primarios Vivos */
        .color-0 { background-color: #FFD600; } 
        .color-1 { background-color: #2979FF; } 
        .color-2 { background-color: #FF1744; } 
        .color-3 { background-color: #00E676; }

        .tag { cursor: pointer; text-decoration: underline; }
        input[type=range] { accent-color: #000; }
    </style>
</head>
<body class="p-4 md:p-10">
    <header class="flex flex-col md:flex-row justify-between items-center mb-16 border-b-[12px] border-black pb-10 gap-8">
        <div>
            <h1 class="titular text-6xl md:text-8xl italic uppercase tracking-tighter leading-none">SCIENCE WORLD NEWS</h1>
            <p class="font-black text-xs tracking-[0.5em] mt-2 uppercase">Tesauro UNESCO — 2026</p>
        </div>

        <div class="w-full md:w-1/2 bg-white border-[6px] border-black p-6 shadow-[10px_10px_0px_#000]">
            <div class="flex gap-4 mb-4">
                <input type="text" id="buscador" onkeyup="filtrar()" placeholder="Buscador Universal (Lacan, Química...)" class="w-full p-3 border-4 border-black font-black uppercase text-xs outline-none">
                <button onclick="location.reload()" class="bg-red-600 text-white px-4 font-black border-4 border-black">RESET</button>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-[10px] font-black uppercase">Desde 1970</span>
                <input type="range" id="cronos" min="1970" max="2026" value="2026" oninput="filtrar()" class="flex-grow">
                <span id="label-anio" class="bg-black text-white px-3 font-black text-xl">2026</span>
            </div>
        </div>
    </header>

    <main id="galeria" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10 max-w-[1600px] mx-auto pb-32"></main>

    <script>
        let db = [];
        let filtrados = [];
        let cursor = 0;

        async function iniciar() {
            try {
                const r = await fetch('noticias.json?v=' + Date.now());
                db = await r.json();
                filtrados = db;
                cargarNoticias();
            } catch (e) {
                console.error("Error al cargar noticias:", e);
                document.getElementById('galeria').innerHTML = "<p class='col-span-full text-center font-black text-2xl'>Sincronizando... Ejecuta 'Actions' en GitHub.</p>";
            }
        }

        // Infinite Scroll
        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 600) cargarNoticias();
        };

        function cargarNoticias() {
            const g = document.getElementById('galeria');
            const data = filtrados.slice(cursor, cursor + 12);
            
            data.forEach((n, i) => {
                const card = document.createElement('div');
                card.className = `card color-${(cursor + i) % 4}`;
                card.innerHTML = `
                    <div class="p-3 border-b-6 border-black bg-white flex justify-between font-black text-[10px] uppercase">
                        <span class="tag" onclick="filtrarTermino('${n.area}')">UNESCO: ${n.area}</span>
                        <span class="bg-black text-white px-2">${n.leyenda}</span>
                    </div>
                    <img src="${n.img}" class="w-full h-72 object-cover border-b-6 border-black">
                    <div class="p-6 flex-grow flex flex-col">
                        <div class="text-right font-black text-2xl mb-4 italic underline underline-offset-4">${n.fecha}</div>
                        <h2 class="titular text-2xl leading-none mb-4 uppercase border-l-8 border-black pl-3">${n.titulo}</h2>
                        <p class="text-xs font-bold text-justify mb-6">${n.resumen}</p>
                        <div class="mt-auto pt-4 border-t-2 border-black/20 text-[9px] font-black uppercase italic">
                            Keywords: ${n.keywords.split(',').map(k => `<span class="tag mx-1" onclick="filtrarTermino('${k.trim()}')">${k.trim()}</span>`).join('·')}
                        </div>
                    </div>
                    <a href="${n.link}" target="_blank" class="block text-center py-4 bg-black text-white font-black hover:bg-white hover:text-black border-t-6 border-black transition-all">EXPLORAR</a>
                `;
                g.appendChild(card);
            });
            cursor += 12;
        }

        function filtrar() {
            const q = document.getElementById('buscador').value.toLowerCase();
            const y = document.getElementById('cronos').value;
            document.getElementById('label-anio').innerText = y;
            
            filtrados = db.filter(n => (JSON.stringify(n).toLowerCase().includes(q)) && (n.fecha <= y));
            document.getElementById('galeria').innerHTML = '';
            cursor = 0;
            filtrados.sort(() => Math.random() - 0.5); // Mezcla TikTok
            cargarNoticias();
        }

        function filtrarTermino(t) {
            document.getElementById('buscador').value = t;
            filtrar();
        }

        iniciar();
    </script>
</body>
</html>
