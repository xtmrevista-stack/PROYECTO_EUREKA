<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eureka - Filtros e Imágenes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; background: #000; color: white; font-family: sans-serif; }
        .card { height: 50vh; border-bottom: 1px solid #333; position: relative; overflow: hidden; }
        .img-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; z-index: 0; }
        .content { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 1.5rem; background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%); }
        .filter-btn { cursor: pointer; transition: 0.3s; }
        .filter-btn:hover { text-decoration: underline; color: #fff; }
        #reset-btn { position: fixed; bottom: 20px; right: 20px; z-index: 100; display: none; }
    </style>
</head>
<body>
    <button id="reset-btn" onclick="mostrarTodo()" class="bg-red-600 text-white px-4 py-2 rounded-full font-bold shadow-lg">Ver todo de nuevo</button>
    <div id="container"></div>

    <script>
        let todasLasNoticias = [];

        async function load() {
            const res = await fetch('noticias.json');
            todasLasNoticias = await res.json();
            render(todasLasNoticias);
        }

        function render(data) {
            const div = document.getElementById('container');
            div.innerHTML = '';
            data.forEach(n => {
                const section = document.createElement('div');
                section.className = "card";
                
                // Si no hay imagen, ponemos un color oscuro aleatorio
                const fallbackColor = ['#1e1b4b', '#164e63', '#4c1d95', '#701a75'][Math.floor(Math.random() * 4)];
                section.style.backgroundColor = fallbackColor;

                section.innerHTML = `
                    ${n.imagen ? `<img src="${n.imagen}" class="img-bg">` : ''}
                    <div class="content">
                        <div>
                            <span onclick="filtrar('${n.tema}')" class="filter-btn bg-white/20 py-1 px-2 rounded text-[10px] font-bold uppercase tracking-tighter">${n.tema}</span>
                            <span onclick="filtrarSub('${n.subtema}')" class="filter-btn text-blue-300 text-xs font-mono ml-2 italic">${n.subtema}</span>
                        </div>
                        <h1 class="text-lg md:text-xl font-bold leading-tight mt-2 line-clamp-3">${n.titulo}</h1>
                        <div class="flex justify-between items-end mt-4">
                            <p class="text-white/50 text-[10px]">${n.fuente}</p>
                            <a href="${n.link}" target="_blank" class="bg-white text-black px-4 py-2 rounded-lg font-black text-xs">ABRIR</a>
                        </div>
                    </div>
                `;
                div.appendChild(section);
            });
        }

        function filtrar(tema) {
            const filtradas = todasLasNoticias.filter(n => n.tema === tema);
            render(filtradas);
            document.getElementById('reset-btn').style.display = 'block';
            window.scrollTo(0,0);
        }

        function filtrarSub(sub) {
            const filtradas = todasLasNoticias.filter(n => n.subtema === sub);
            render(filtradas);
            document.getElementById('reset-btn').style.display = 'block';
            window.scrollTo(0,0);
        }

        function mostrarTodo() {
            render(todasLasNoticias);
            document.getElementById('reset-btn').style.display = 'none';
        }

        load();
    </script>
</body>
</html>
