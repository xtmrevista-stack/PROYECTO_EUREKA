<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SCIENCE WORLD NEWS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Roboto:wght@400;900&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #f0f0f0; }
        .titular { font-family: 'Archivo Black', sans-serif; }
        .card { border: 6px solid #000; transition: 0.3s; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .card:hover { transform: translate(-12px, -12px); box-shadow: 20px 20px 0px #000; }
        /* Colores Primarios Claros */
        .color-0 { background-color: #fff9c4; } /* Amarillo */
        .color-1 { background-color: #e3f2fd; } /* Azul */
        .color-2 { background-color: #ffebee; } /* Rojo */
        .color-3 { background-color: #e8f5e9; } /* Verde */
    </style>
</head>
<body class="p-4 md:p-10">
    <header class="text-center mb-16 border-b-[12px] border-black pb-10 bg-white shadow-[10px_10px_0px_#000]">
        <h1 class="titular text-6xl md:text-9xl italic uppercase tracking-tighter leading-none">SCIENCE WORLD NEWS</h1>
        <p class="font-black text-sm tracking-[0.5em] mt-6 uppercase">Inteligencia Científica — 2026</p>
    </header>

    <main id="galeria" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 max-w-[1400px] mx-auto"></main>

    <script>
        async function cargarNoticias() {
            try {
                const respuesta = await fetch('noticias.json?v=' + Date.now());
                const datos = await respuesta.json();
                const contenedor = document.getElementById('galeria');
                
                contenedor.innerHTML = datos.map((n, i) => `
                    <div class="card color-${i % 4}">
                        <div class="p-4 border-b-6 border-black bg-white flex justify-between font-black text-[11px] uppercase italic">
                            <span>ÁREA: ${n.area}</span>
                            <span class="bg-black text-white px-3 tracking-widest">${n.leyenda}</span>
                        </div>
                        
                        <div class="h-64 border-b-6 border-black overflow-hidden">
                            <img src="${n.imagen}" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-500">
                        </div>

                        <div class="p-8 flex-grow flex flex-col">
                            <div class="text-right font-black text-2xl mb-4 italic underline decoration-4">AÑO: ${n.fecha}</div>
                            <h2 class="titular text-3xl leading-none mb-6 uppercase border-l-8 border-black pl-4">${n.titulo}</h2>
                            <p class="text-sm font-bold leading-relaxed text-justify mb-8">${n.resumen}</p>
                            
                            <div class="mt-auto pt-6 border-t-4 border-black/20 text-[10px] font-black uppercase tracking-tight">
                                <span class="bg-black text-white px-2 mr-2">PALABRAS CLAVE:</span> ${n.palabras_clave}
                            </div>
                        </div>

                        <a href="${n.link}" target="_blank" class="block text-center py-6 bg-black text-white font-black text-lg hover:bg-white hover:text-black border-t-6 border-black transition-colors uppercase italic">Explorar Investigación</a>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('galeria').innerHTML = "<p class='col-span-full text-center py-20 font-black text-4xl italic uppercase'>Sincronizando el Cerebro Maestro... Revisa Actions.</p>";
            }
        }
        cargarNoticias();
    </script>
</body>
</html>
