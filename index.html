<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SCIENCE WORLD NEWS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Roboto:wght@400;900&display=swap');
        body { font-family: 'Roboto', sans-serif; background: #fff; }
        .titular { font-family: 'Archivo Black', sans-serif; }
        .card { border: 6px solid #000; transition: 0.3s; height: 100%; display: flex; flex-direction: column; background: white; }
        .card:hover { transform: translate(-8px, -8px); box-shadow: 15px 15px 0px #000; }
        
        .color-0 { background-color: #FF1744; } .color-1 { background-color: #FFD600; }
        .color-2 { background-color: #00E676; } .color-3 { background-color: #2979FF; }
        .color-4 { background-color: #00B0FF; } .color-5 { background-color: #FF6D00; }
        .color-6 { background-color: #880E4F; color: white; }

        .tag-nav { cursor: pointer; font-weight: 900; }
        .tag-nav:hover { background: #000; color: #fff; text-decoration: underline; }
    </style>
</head>
<body class="p-4 md:p-10">
    
    <header class="mb-16 border-b-[10px] border-black pb-8 max-w-[1700px] mx-auto">
        <h1 class="titular text-4xl md:text-6xl italic uppercase tracking-tighter mb-2 cursor-pointer" onclick="location.reload()">
            SCIENCE WORLD NEWS
        </h1>
        <p class="font-black text-[10px] md:text-xs tracking-[0.4em] uppercase mb-8 opacity-70">
            Archivo de Divulgación Científica Universal e Histórica — 2026
        </p>

        <div class="flex flex-col md:flex-row gap-6 items-center bg-white border-[6px] border-black p-5 shadow-[10px_10px_0px_#000]">
            <div class="flex w-full md:w-2/3 gap-3">
                <input type="text" id="buscador" onkeyup="filtrar()" placeholder="BUSCAR: LACAN, ALGORITMO, PUZOLANA, CUALQUIER CONCEPTO..." class="w-full p-4 border-4 border-black font-black uppercase text-sm outline-none">
                <button onclick="resetear()" class="bg-black text-white px-8 font-black border-4 border-black hover:bg-red-600 transition-all uppercase">Reset</button>
            </div>
            
            <div class="flex items-center gap-5 w-full md:w-1/3 border-l-0 md:border-l-4 border-black pl-0 md:pl-5">
                <span class="text-[10px] font-black uppercase whitespace-nowrap">Cronología</span>
                <input type="range" id="cronos" min="1970" max="2026" value="2026" oninput="filtrar()" class="flex-grow accent-black">
                <span id="label-anio" class="bg-black text-white px-5 font-black text-2xl tracking-tighter">2026</span>
            </div>
        </div>
    </header>

    <main id="galeria" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-14 max-w-[1700px] mx-auto pb-40"></main>

    <script>
        let db = []; let filtrados = []; let cursor = 0;

        async function iniciar() {
            const r = await fetch('noticias.json?v=' + Date.now());
            db = await r.json();
            filtrados = db;
            cargarMas();
        }

        window.onscroll = () => { if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 1000) cargarMas(); };

        function cargarMas() {
            const g = document.getElementById('galeria');
            const data = filtrados.slice(cursor, cursor + 9);
            
            data.forEach((n, i) => {
                const colorIndex = (cursor + i) % 7;
                const card = document.createElement('div');
                card.className = `card`;
                card.innerHTML = `
                    <div class="p-4 border-b-6 border-black font-black text-[10px] uppercase bg-white">
                        <span class="tag-nav text-lg" onclick="addFiltro('${n.area}')">ÁREA: ${n.area}</span><br>
                        <span class="tag-nav text-blue-800" onclick="addFiltro('${n.subcategoria}')">SUB-ÁREA: ${n.subcategoria}</span>
                    </div>
                    <img src="${n.img}" class="w-full h-72 object-cover border-b-6 border-black grayscale hover:grayscale-0 transition-all">
                    <div class="p-8 flex-grow flex flex-col color-${colorIndex}">
                        <div class="flex justify-between items-center mb-6">
                            <span class="bg-black text-white text-[9px] px-3 font-black py-2 tracking-widest uppercase">${n.leyenda}</span>
                            <span class="font-black text-4xl italic underline decoration-8 underline-offset-4">${n.fecha}</span>
                        </div>
                        <h2 class="titular text-2xl leading-tight mb-6 uppercase border-l-[8px] border-black pl-4">${n.titulo}</h2>
                        <div class="bg-white/90 p-5 border-4 border-black mb-6 flex-grow shadow-[6px_6px_0px_rgba(0,0,0,0.1)]">
                            <p class="text-[9px] font-black mb-3 uppercase border-b-2 border-black/20 pb-2">${n.procedencia}</p>
                            <p class="text-sm font-bold text-justify leading-relaxed">RESUMEN: ${n.resumen}</p>
                        </div>
                        <div class="mt-auto pt-5 border-t-2 border-black/30 text-[10px] font-black uppercase">
                            <span class="bg-black text-white px-2 py-1 mr-1 italic">PALABRAS CLAVE:</span> 
                            ${n.palabras_clave.split(',').map(k => `<span class="tag-nav mx-1" onclick="addFiltro('${k.trim()}')">${k.trim()}</span>`).join(' • ')}
                        </div>
                    </div>
                    <a href="${n.link}" target="_blank" class="block text-center py-5 bg-black text-white font-black text-lg border-t-6 border-black hover:bg-white hover:text-black transition-all uppercase italic">Ver Fuente Original</a>
                `;
                g.appendChild(card);
            });
            cursor += 9;
        }

        function addFiltro(t) {
            const b = document.getElementById('buscador');
            b.value = b.value ? b.value + ", " + t : t;
            filtrar();
        }

        function filtrar() {
            const query = document.getElementById('buscador').value.toLowerCase().split(',').map(s => s.trim());
            const anio = document.getElementById('cronos').value;
            document.getElementById('label-anio').innerText = anio;
            
            filtrados = db.filter(n => {
                const matchTexto = query.every(term => JSON.stringify(n).toLowerCase().includes(term));
                return matchTexto && n.fecha <= anio;
            });
            
            document.getElementById('galeria').innerHTML = '';
            cursor = 0;
            cargarMas();
        }

        function resetear() {
            document.getElementById('buscador').value = '';
            document.getElementById('cronos').value = 2026;
            filtrar();
        }

        iniciar();
    </script>
</body>
</html>
