<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCIENCE WORLD NEWS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* Estética de Periódico Moderno */
        body { background: #ffffff; color: #000000; font-family: 'Roboto', sans-serif; }
        h1 { font-family: 'Playfair Display', serif; letter-spacing: -1px; }
        
        .masonry-grid {
            column-count: 1;
            column-gap: 20px;
            padding: 20px;
        }
        @media (min-width: 768px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 3; } } /* 3 a 4 columnas máximo */
        @media (min-width: 1440px) { .masonry-grid { column-count: 4; } }

        .news-card {
            break-inside: avoid;
            margin-bottom: 30px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .news-card:hover { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); transform: translateY(-2px); }
        
        .headline { font-family: 'Roboto', sans-serif; font-weight: 900; line-height: 1.2; color: #000; }
        .summary { font-family: 'Roboto', sans-serif; font-weight: 300; color: #4b5563; font-size: 1.05rem; }
        
        .keyword-tag {
            display: inline-block;
            background: #f3f4f6;
            color: #2563eb;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 5px;
            margin-top: 5px;
            cursor: pointer;
        }
        .keyword-tag:hover { background: #dbeafe; }
    </style>
</head>
<body>
    <header class="py-10 border-b-4 border-black mb-8 mx-5">
        <h1 class="text-5xl md:text-7xl text-center font-black">SCIENCE WORLD NEWS</h1>
        <p class="text-center text-sm font-mono mt-2 uppercase tracking-widest text-gray-600">Edición Digital para Mentes Curiosas</p>
    </header>

    <div id="filter-info" class="px-8 mb-4 hidden">
        <button onclick="mostrarTodo()" class="text-blue-600 font-bold underline text-sm">← Ver todas las noticias</button>
    </div>

    <div id="container" class="masonry-grid"></div>

    <script>
        let noticiasBase = [];

        async function cargar() {
            try {
                const r = await fetch('noticias.json');
                noticiasBase = await r.json();
                renderizar(noticiasBase.sort(() => Math.random() - 0.5));
            } catch (e) { console.error("Error al conectar con la base de datos."); }
        }

        function renderizar(data) {
            const c = document.getElementById('container');
            c.innerHTML = '';
            data.forEach(n => {
                const div = document.createElement('div');
                div.className = "news-card";
                
                // Generar tags aleatorios (simulados basados en el subtema)
                const keywords = [n.subtema, n.tema.split(' ')[1], "Investigación"];
                const tagsHtml = keywords.map(k => `<span class="keyword-tag" onclick="filtrar('${k}')">#${k}</span>`).join('');

                div.innerHTML = `
                    <img src="${n.imagen || 'https://images.unsplash.com/photo-1518152006812-edab29b069ac?w=500'}" class="w-full h-auto">
                    <div class="p-5">
                        <h2 class="headline text-2xl mb-3 uppercase font-black">${n.titulo}</h2>
                        <p class="summary mb-4 line-clamp-4">${n.resumen || 'Explora los detalles de este avance científico que está cambiando nuestra forma de entender el mundo actual.'}</p>
                        <div class="flex items-center gap-2 mb-4">
                            <img src="https://www.google.com/s2/favicons?domain=${n.link}&sz=32" class="w-4 h-4">
                            <span class="text-[10px] font-bold text-gray-400 uppercase">${n.fuente}</span>
                        </div>
                        <div class="mb-5">${tagsHtml}</div>
                        <button onclick="lanzarEureka('${n.link}')" class="w-full bg-black text-white py-3 font-black tracking-tighter hover:bg-blue-700 transition-colors">
                            ¡EUREKA!
                        </button>
                    </div>
                `;
                c.appendChild(div);
            });
        }

        function lanzarEureka(url) {
            if(confirm("¡Momento Eureka detectado!\n\n¿Quieres profundizar en esta investigación en su fuente original?")) {
                window.open(url, '_blank');
            }
        }

        function filtrar(palabra) {
            const filtradas = noticiasBase.filter(n => 
                n.titulo.toLowerCase().includes(palabra.toLowerCase()) || 
                n.subtema.toLowerCase().includes(palabra.toLowerCase())
            );
            document.getElementById('filter-info').classList.remove('hidden');
            renderizar(filtradas);
            window.scrollTo(0,0);
        }

        function mostrarTodo() {
            document.getElementById('filter-info').classList.add('hidden');
            renderizar(noticiasBase);
        }

        cargar();
    </script>
</body>
</html>
