<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SCIENCE WORLD NEWS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Roboto:wght@300;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #fff; }
        h1 { font-family: 'Playfair Display', serif; }
        .card { break-inside: avoid; margin-bottom: 25px; border: 4px solid #000; transition: 0.3s; background: #fff; }
        .card:hover { transform: translate(-8px, -8px); box-shadow: 12px 12px 0px #000; }
        input[type=range] { 
            accent-color: #000; height: 14px; border-radius: 10px; background: #eee; appearance: none; cursor: pointer;
        }
    </style>
</head>
<body>
    <header class="py-12 border-b-[12px] border-black text-center mx-6">
        <h1 class="text-6xl md:text-8xl font-black italic tracking-tighter uppercase">Science World News</h1>
        <p class="font-bold text-[10px] tracking-[0.5em] mt-4 uppercase">Archivo Científico e Histórico 1970 — 2026</p>
    </header>

    <div class="max-w-7xl mx-auto px-6 -mt-8 mb-10">
        <div class="bg-white border-4 border-black p-6 flex flex-col md:flex-row items-center gap-10 shadow-[8px_8px_0px_#000]">
            <div class="w-full md:w-1/4">
                <label class="block text-[10px] font-black uppercase mb-2 italic">Buscador</label>
                <input type="text" id="search" onkeyup="filtrar()" placeholder="Goce, Nitruro..." class="w-full p-3 border-2 border-black font-bold outline-none">
            </div>
            <div class="w-full md:w-3/4">
                <label class="block text-[10px] font-black uppercase mb-2 italic">Línea de Tiempo: <span id="year-label" class="text-blue-600 text-lg">2026</span></label>
                <input type="range" id="slider" min="1970" max="2026" value="2026" oninput="filtrar()" class="w-full">
                <div class="flex justify-between font-black text-[10px] mt-2">
                    <span>1970</span><span>1985</span><span>2000</span><span>2015</span><span>2026</span>
                </div>
            </div>
        </div>
    </div>

    <main id="galeria" class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-7xl mx-auto px-6"></main>

    <script>
        let db = [];
        async function iniciar() {
            try {
                const r = await fetch('noticias.json?v=' + Date.now());
                db = await r.json();
                renderizar(db);
            } catch(e) {
                document.getElementById('galeria').innerHTML = "<p class='col-span-3 text-center py-20 font-black italic uppercase'>Sincronizando el Cerebro Maestro...</p>";
            }
        }
        function filtrar() {
            const q = document.getElementById('search').value.toLowerCase();
            const y = parseInt(document.getElementById('slider').value);
            document.getElementById('year-label').innerText = y;
            renderizar(db.filter(n => JSON.stringify(n).toLowerCase().includes(q) && n.fecha <= y));
        }
        function renderizar(lista) {
            const g = document.getElementById('galeria');
            g.innerHTML = lista.map(n => `
                <div class="card p-6">
                    <div class="flex justify-between font-black text-[9px] mb-4 border-b border-black/10 pb-2 uppercase italic">
                        <span class="bg-black text-white px-2 py-1">Hallazgo</span>
                        <span class="text-sm underline">${n.fecha}</span>
                    </div>
                    <h2 class="text-2xl font-black uppercase leading-none mb-4">${n.titulo}</h2>
                    <div class="flex flex-wrap gap-2 mb-6">
                        ${n.conceptos.map(c => `<span class="text-[9px] font-bold border-2 border-black px-2">#${c}</span>`).join('')}
                    </div>
                    <button onclick="window.open('${n.link}','_blank')" class="w-full py-3 border-4 border-black font-black text-xs hover:bg-black hover:text-white transition-all uppercase">Explorar</button>
                </div>
            `).join('');
        }
        iniciar();
    </script>
</body>
</html>
