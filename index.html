<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eureka - Panel Científico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        /* Lógica Pinterest */
        .masonry-grid {
            column-count: 2; /* Móvil */
            column-gap: 12px;
            padding: 12px;
        }
        @media (min-width: 768px) { .masonry-grid { column-count: 4; } }
        @media (min-width: 1200px) { .masonry-grid { column-count: 6; } }

        .news-card {
            break-inside: avoid;
            margin-bottom: 12px;
            background: #1e1e1e;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        .news-card:hover { transform: scale(1.02); }
        .category-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.6rem;
            font-weight: bold;
            text-transform: uppercase;
            background: rgba(0,0,0,0.7);
        }
        .source-logo {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <header class="p-6 text-center">
        <h1 class="text-3xl font-black bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent italic">EUREKA</h1>
        <p class="text-gray-500 text-xs mt-1">Explora el conocimiento aleatorio</p>
    </header>

    <div id="container" class="masonry-grid"></div>

    <script>
        const colores = {
            "CIENCIAS NATURALES": "#4ade80", "CIENCIAS SOCIALES": "#f87171", 
            "CIENCIAS FORMALES": "#60a5fa", "HUMANIDADES": "#fbbf24",
            "CIENCIAS APLICADAS": "#a78bfa"
        };

        async function cargarNoticias() {
            try {
                const r = await fetch('noticias.json');
                let datos = await r.json();
                // Lógica TikTok: Mezclar noticias aleatoriamente
                datos = datos.sort(() => Math.random() - 0.5);
                dibujar(datos);
            } catch (e) { console.error("Error cargando el océano de noticias"); }
        }

        function abrirNoticia(url) {
            const confirmar = confirm("Estás por abrir un sitio externo.\n\nTip: Si el sitio está en inglés, haz clic derecho en cualquier parte de la página y selecciona 'Traducir a español'.\n\n¿Deseas continuar?");
            if (confirmar) window.open(url, '_blank');
        }

        function dibujar(lista) {
            const c = document.getElementById('container');
            c.innerHTML = '';
            lista.forEach(n => {
                const div = document.createElement('div');
                div.className = "news-card";
                div.onclick = () => abrirNoticia(n.link);
                div.innerHTML = `
                    <div class="category-tag" style="color: ${colores[n.tema] || '#fff'}">${n.tema}</div>
                    <img src="${n.imagen || 'https://images.unsplash.com/photo-1532094349884-543bc11b234d?w=400'}" class="w-full h-auto block opacity-80">
                    <div class="p-3">
                        <h2 class="text-xs font-bold leading-tight line-clamp-3 mb-2">${n.titulo}</h2>
                        <div class="flex items-center text-[9px] text-gray-400 font-mono">
                            <img src="https://www.google.com/s2/favicons?domain=${n.link}&sz=32" class="source-logo" onerror="this.style.display='none'">
                            <span>${n.fuente}</span>
                        </div>
                    </div>
                `;
                c.appendChild(div);
            });
        }

        cargarNoticias();
    </script>
</body>
</html>
